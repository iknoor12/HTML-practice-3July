<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="feedback.html">Feedback</a></li>
                <li><a href="grades_table.html">Grades</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="feedback">
        
        <h1>Please share your feedback to help improve this website!</h1>

        <form action="#" class="form">

            <label for="name" class="label">Name: </label>
            <input type="text" id="name" placeholder="Enter your name">
            <br>
            <br>

            <label for="email" class="label">Email: </label>
            <input type="email" id="email" placeholder="Enter your email">
            <br>
            <br>

            <label for="gender" class="label">Gender: </label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
            <br>
            <br>

            <label for="rating" class="label">Website rating: </label>
            <input type="radio" name="rating" value="excellent"> Excellent
            <input type="radio" name="rating" value="good"> Good
            <input type="radio" name="rating" value="average"> Average
            <input type="radio" name="rating" value="poor"> Poor
            <br>
            <br>

            <label for="favorite" class="label">Favorite section: </label>
            <select id="favorite">
                <option value="select">Select a section</option>
                <option value="profile">Home</option>
                <option value="courses">Courses</option>
                <option value="profile">Profile</option>
                <option value="grades">Grades</option>
            </select>
            <br>
            <br>

            <label for="suggestions" class="label">Suggestions: </label>
            <textarea id="suggestions" placeholder="Enter your suggestions"></textarea>
            <br>
            <br>

            <label for="recommend" class="label">Would you recommend this website?: </label>
            <input type="radio" id="yes" name="recommend" value="yes">
            <label for="yes">Yes</label>
            <input type="radio" id="no" name="recommend" value="no">
            <label for="no">No</label>
            <br>
            <br>

            <input type="checkbox" id="terms">
            <label for="terms">I agree to the terms and conditions.</label>
            <br>
            <br>

            <button type="submit" value="Submit">Submit</button>

            <button type="reset" value="Reset">Reset</button>

        </form>
    </main>
    <footer>
        <h3>Thank you for visiting my Student Profile & Course Portal.</h3>
    </footer>

</body>

</html>
